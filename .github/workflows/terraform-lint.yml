name: Terraform lint (fmt / validate)

# Runs on every PR and push to main with no path filter — terraform-apply.yml's
# wait-for-lint gate depends on a lint run existing for every such change, so
# don't add a paths filter here without revisiting that gate (a filtered-out lint
# run would leave the apply waiting until it times out).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_VERSION: 1.10.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::266535567738:role/gha-terraform-shared-db
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate
