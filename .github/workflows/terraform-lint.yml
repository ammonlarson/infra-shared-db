name: Terraform lint (fmt / validate)

# Runs on every PR and push to main with no path filter — terraform-apply.yml's
# wait-for-lint gate depends on a lint run existing for every such change, so
# don't add a paths filter here without revisiting that gate (a filtered-out lint
# run would leave the apply waiting until it times out).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  TF_VERSION: 1.10.0

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      # Backend-less init: validate doesn't need state, so the lint gate
      # needs no AWS credentials.
      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate
