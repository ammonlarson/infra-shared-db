name: Terraform plan / apply (via SSM bastion)

# Bastion-based plan/apply that reaches the private RDS the same way an operator
# does locally: RDS has no public endpoint, so this job opens an SSM port-forward
# through the bastion (scripts/db-tunnel.sh) before running Terraform. That tunnel
# is what lets the cyrilgdn/postgresql provider refresh postgresql_role /
# postgresql_database — which is why even `terraform plan` belongs here and not in
# the fmt/validate lint gate (terraform-lint.yml), which never dials RDS.
#
# Runs three ways:
#   - terraform plan on pull requests to main — the authoritative diff for review;
#   - terraform apply automatically on push to main when Terraform-relevant files
#     change, so a merged change is applied without an operator remembering to;
#   - manually via workflow_dispatch with a plan/apply choice, for ad hoc runs.
# pull_request runs plan only — it never applies; apply happens after the merge.
# (PRs from forks can't assume the OIDC role, so the plan job there is expected to
# fail at AWS auth; this repo's PRs come from same-repo branches.) The bastion must
# already exist — it is bootstrapped operator-side (see the migration steps in
# README.md).
#
# Ordering: the real Terraform work is gated behind the terraform-lint.yml lint
# workflow. The wait-for-lint job blocks the plan/apply job until the lint run for
# this same change (head SHA + event) finishes successfully, so a broken
# fmt/validate never reaches the tunnel or RDS state. Manual workflow_dispatch
# runs skip the gate (an ad hoc run isn't tied to a lint run).

on:
  pull_request:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - "scripts/db-tunnel.sh"
      - ".github/workflows/terraform-apply.yml"
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - "scripts/db-tunnel.sh"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        type: choice
        options:
          - plan
          - apply
        default: plan

# Serialize runs per ref so overlapping applies to main cannot race the same
# state. The group is keyed on the ref, so each PR and the main apply queue
# independently. A superseded PR plan is canceled when a newer commit lands
# (cancel-in-progress on pull_request only); a main apply is never canceled
# mid-write.
concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_VERSION: 1.10.0
  # workflow_dispatch honors the chosen plan/apply input; a pull request plans
  # (never applies); a push to main applies the merged change.
  TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || (github.event_name == 'pull_request' && 'plan' || 'apply') }}

jobs:
  # Gate: don't touch the tunnel or RDS state until the lint workflow has gone
  # green for this same change. Polls the Actions API for the terraform-lint.yml
  # run matching this head SHA + event — succeeds only when that run concludes
  # 'success', fails fast on any other conclusion, and otherwise waits. Skipped
  # for workflow_dispatch, which isn't tied to a lint run.
  wait-for-lint:
    name: Wait for Terraform lint
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' }}
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - name: Wait for the lint workflow to succeed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          LINT_WORKFLOW: terraform-lint.yml
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          TIMEOUT_SECONDS: "1200"
          POLL_SECONDS: "15"
        run: |
          set -euo pipefail
          echo "Gating on '$LINT_WORKFLOW' for $EVENT_NAME @ $HEAD_SHA"
          deadline=$((SECONDS + TIMEOUT_SECONDS))
          while true; do
            # Tolerate a transient API failure (5xx, rate-limit, network blip):
            # fall through to the wait branch rather than letting set -e fail the
            # gate and wrongly skip a legitimate apply. The deadline still bounds it.
            if ! run_info=$(gh api -X GET \
              "repos/$GH_REPO/actions/workflows/$LINT_WORKFLOW/runs" \
              -f head_sha="$HEAD_SHA" \
              -f event="$EVENT_NAME" \
              --jq '.workflow_runs | sort_by(.run_started_at) | last
                    | "\(.status // "none") \(.conclusion // "none")"' 2>/dev/null); then
              echo "Actions API query failed (transient?); will retry." >&2
              run_info="none none"
            fi
            status=${run_info%% *}
            conclusion=${run_info##* }
            case "$status" in
              completed)
                if [ "$conclusion" = "success" ]; then
                  echo "Lint succeeded — releasing the gate."
                  exit 0
                fi
                echo "Lint concluded '$conclusion' — not proceeding." >&2
                exit 1
                ;;
              none)
                echo "No lint run found yet for $HEAD_SHA; waiting..."
                ;;
              *)
                echo "Lint status '$status'; waiting..."
                ;;
            esac
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for the lint workflow to finish." >&2
              exit 1
            fi
            sleep "$POLL_SECONDS"
          done

  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.action || (github.event_name == 'pull_request' && 'plan' || 'apply') }}
    runs-on: ubuntu-latest
    needs: wait-for-lint
    # Run after a green gate; also run on workflow_dispatch (gate skipped). Skip
    # when lint failed (gate 'failure'). !cancelled() forces this if to evaluate
    # even though the dependency was skipped on a manual dispatch.
    if: ${{ !cancelled() && (needs.wait-for-lint.result == 'success' || needs.wait-for-lint.result == 'skipped') }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::266535567738:role/gha-terraform-shared-db
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Session Manager plugin and psql client
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/smp.deb
          sudo dpkg -i /tmp/smp.deb
          # pg_isready probes the tunnel end to end (it speaks to RDS through the
          # forward), not just the local listener.
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Open SSM tunnel to RDS
        run: |
          scripts/db-tunnel.sh 15432 "$AWS_REGION" > /tmp/tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> "$GITHUB_ENV"
          # A bound local port only means the listener is up; pg_isready confirms
          # the forward actually reaches RDS before we hand off to Terraform.
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 15432 >/dev/null 2>&1; then
              echo "tunnel reaches RDS"
              exit 0
            fi
            sleep 2
          done
          echo "tunnel did not reach RDS in time" >&2
          cat /tmp/tunnel.log >&2
          exit 1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        if: ${{ env.TF_ACTION == 'plan' }}
        run: terraform plan

      - name: Terraform apply
        if: ${{ env.TF_ACTION == 'apply' }}
        run: terraform apply -auto-approve

      - name: Surface shared-db VPC outputs
        # Read-only: pulls from the remote state, not RDS, so it runs after both
        # plan and apply. Peer-VPC consumers (e.g. loppemarked) need these to wire
        # requester-side VPC peering back to the shared-db VPC, which saves the
        # operator from running `terraform output` by hand. Emits to the run log
        # and the job summary; tolerates outputs not yet existing on a first plan.
        run: |
          vpc_id="$(terraform output -raw default_vpc_id 2>/dev/null || true)"
          vpc_cidr="$(terraform output -raw default_vpc_cidr 2>/dev/null || true)"
          echo "default_vpc_id=$vpc_id"
          echo "default_vpc_cidr=$vpc_cidr"
          {
            echo "### Shared-db VPC outputs"
            echo
            if [ -n "$vpc_id" ] && [ -n "$vpc_cidr" ]; then
              echo "For peer-VPC consumers wiring VPC peering back to the shared-db VPC:"
              echo
              echo "| Output | Value |"
              echo "| --- | --- |"
              echo "| \`default_vpc_id\` | \`$vpc_id\` |"
              echo "| \`default_vpc_cidr\` | \`$vpc_cidr\` |"
            else
              echo "Outputs not present in state yet (nothing applied)."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close SSM tunnel
        if: always()
        run: kill "$TUNNEL_PID" 2>/dev/null || true
