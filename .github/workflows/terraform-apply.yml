name: Terraform apply (via SSM bastion)

# Bastion-based plan/apply that can refresh Postgres-level resources
# (postgresql_role / postgresql_database) from CI. RDS is private, so this job
# opens an SSM port-forward through the bastion before running Terraform — the
# same path scripts/db-tunnel.sh gives an operator locally.
#
# Runs two ways:
#   - automatically on push to main when Terraform-relevant files change, so a
#     merged Terraform change is applied without an operator remembering to;
#   - manually via workflow_dispatch with a plan/apply choice, for ad hoc runs.
# It is never wired to pull_request — applies only happen after a merge to main.
# The bastion must already exist (it is bootstrapped operator-side — see the
# migration steps in README.md). The PR lint gate in terraform.yml is unchanged.

on:
  push:
    branches: [main]
    paths:
      - "**.tf"
      - ".terraform.lock.hcl"
      - "scripts/db-tunnel.sh"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        type: choice
        options:
          - plan
          - apply
        default: plan

# Serialize applies to main so overlapping runs cannot race the same state. An
# in-progress apply is allowed to finish rather than being canceled mid-write.
concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_VERSION: 1.10.0
  # A push to main always applies the merged change; workflow_dispatch honors the
  # chosen plan/apply input.
  TF_ACTION: ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'apply' }}

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'workflow_dispatch' && inputs.action || 'apply' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::266535567738:role/gha-terraform-shared-db
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Session Manager plugin and psql client
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/smp.deb
          sudo dpkg -i /tmp/smp.deb
          # pg_isready probes the tunnel end to end (it speaks to RDS through the
          # forward), not just the local listener.
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client

      - name: Open SSM tunnel to RDS
        run: |
          scripts/db-tunnel.sh 15432 "$AWS_REGION" > /tmp/tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> "$GITHUB_ENV"
          # A bound local port only means the listener is up; pg_isready confirms
          # the forward actually reaches RDS before we hand off to Terraform.
          for _ in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 15432 >/dev/null 2>&1; then
              echo "tunnel reaches RDS"
              exit 0
            fi
            sleep 2
          done
          echo "tunnel did not reach RDS in time" >&2
          cat /tmp/tunnel.log >&2
          exit 1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        if: ${{ env.TF_ACTION == 'plan' }}
        run: terraform plan

      - name: Terraform apply
        if: ${{ env.TF_ACTION == 'apply' }}
        run: terraform apply -auto-approve

      - name: Close SSM tunnel
        if: always()
        run: kill "$TUNNEL_PID" 2>/dev/null || true
