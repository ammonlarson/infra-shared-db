name: Terraform apply (via SSM bastion)

# Operator-triggered plan/apply that can refresh Postgres-level resources
# (postgresql_role / postgresql_database) from CI. RDS is private, so this job
# opens an SSM port-forward through the bastion before running Terraform — the
# same path scripts/db-tunnel.sh gives an operator locally.
#
# This is workflow_dispatch only, not push/PR: applies stay a deliberate act,
# and the bastion must already exist (it is bootstrapped operator-side — see the
# migration steps in README.md). The PR lint gate in terraform.yml is unchanged.

on:
  workflow_dispatch:
    inputs:
      action:
        description: Terraform action to run
        type: choice
        options:
          - plan
          - apply
        default: plan

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-north-1
  TF_VERSION: 1.10.0

jobs:
  terraform:
    name: Terraform ${{ inputs.action }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::266535567738:role/gha-terraform-shared-db
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install Session Manager plugin
        run: |
          curl -fsSL "https://s3.amazonaws.com/session-manager-downloads/plugin/latest/ubuntu_64bit/session-manager-plugin.deb" -o /tmp/smp.deb
          sudo dpkg -i /tmp/smp.deb

      - name: Open SSM tunnel to RDS
        run: |
          scripts/db-tunnel.sh 5432 "$AWS_REGION" > /tmp/tunnel.log 2>&1 &
          echo "TUNNEL_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 30); do
            if (echo > /dev/tcp/127.0.0.1/5432) 2>/dev/null; then
              echo "tunnel is up"
              exit 0
            fi
            sleep 2
          done
          echo "tunnel did not come up in time" >&2
          cat /tmp/tunnel.log >&2
          exit 1

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        if: ${{ inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Close SSM tunnel
        if: always()
        run: kill "$TUNNEL_PID" 2>/dev/null || true
